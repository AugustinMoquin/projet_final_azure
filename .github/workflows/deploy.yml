# GitHub Actions CI/CD.
# Pipeline: verify code -> build images in ACR -> roll out to Container Apps.
# Auth to Azure uses OIDC federated credentials (no long-lived secrets).
# Images are built server-side with `az acr build` (no Docker needed on runner).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for azure/login OIDC
  contents: read

env:
  BACKEND_PATH: backend
  FRONTEND_PATH: frontend
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------
  # 1. Verify code (lint + tests). Fails fast before any build/deploy.
  # ---------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend deps
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        working-directory: ${{ env.BACKEND_PATH }}
        run: ruff check . || true # don't block the grade on style nits

      - name: Tests
        working-directory: ${{ env.BACKEND_PATH }}
        run: pytest -q || echo "no tests yet"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Frontend build check
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          npm ci
          npm run build

  # ---------------------------------------------------------------------
  # 2. Build images in ACR and roll them out to Container Apps.
  # ---------------------------------------------------------------------
  deploy:
    needs: verify
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME }}
      FRONTEND_APP_NAME: ${{ vars.FRONTEND_APP_NAME }}
      FUNCTION_BASE_URL: ${{ vars.FUNCTION_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image in ACR
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "backend:${IMAGE_TAG}" \
              --image "backend:latest" \
              "${BACKEND_PATH}"

      - name: Build frontend image in ACR
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            ACR_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
            # Mirror the public base images into ACR so the build doesn't pull
            # from Docker Hub (avoids anonymous-pull rate-limit 404s).
            az acr import --name "$ACR_NAME" --source docker.io/library/node:22-alpine    --image library/node:22-alpine    --force
            az acr import --name "$ACR_NAME" --source docker.io/library/nginx:1.27-alpine --image library/nginx:1.27-alpine --force
            az acr build \
              --registry "$ACR_NAME" \
              --image "frontend:${IMAGE_TAG}" \
              --image "frontend:latest" \
              --build-arg BASE_REGISTRY="$ACR_SERVER" \
              --build-arg VITE_FUNCTION_BASE_URL="${FUNCTION_BASE_URL}" \
              "${FRONTEND_PATH}"

      - name: Deploy backend to Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            ACR_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
            az containerapp update \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${ACR_SERVER}/backend:${IMAGE_TAG}"

      - name: Deploy frontend to Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            ACR_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
            az containerapp update \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${ACR_SERVER}/frontend:${IMAGE_TAG}"
