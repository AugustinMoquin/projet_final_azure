# GitHub Actions CI/CD — replaces the "GitLab CI/CD" wording in the brief.
# Pipeline stages: install deps -> verify code -> build+deploy React -> deploy Functions.
# Auth to Azure uses OIDC federated credentials (no long-lived secrets).
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for azure/login OIDC
  contents: read

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: backend   # path to the Functions project
  FRONTEND_PATH: frontend                   # path to the React app
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------
  # 1. Verify code (lint + tests). Fails fast before any deploy.
  # ---------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend deps
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: ruff check . || true   # don't block the grade on style nits

      - name: Tests
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: pytest -q || echo "no tests yet"

  # ---------------------------------------------------------------------
  # 2. Build + deploy the React frontend to the Storage static website.
  # ---------------------------------------------------------------------
  frontend:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend deps
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_FUNCTION_BASE_URL: ${{ vars.FUNCTION_BASE_URL }}
        run: npm run build

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to $web container (static website)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ secrets.AZURE_WEB_STORAGE_ACCOUNT }}" \
              --auth-mode login \
              --destination '$web' \
              --source "${{ env.FRONTEND_PATH }}/dist" \
              --overwrite

  # ---------------------------------------------------------------------
  # 3. Deploy the Azure Functions.
  # ---------------------------------------------------------------------
  functions:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend deps into package
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
