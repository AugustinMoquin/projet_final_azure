server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: route everything that isn't a real file back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; never cache the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
